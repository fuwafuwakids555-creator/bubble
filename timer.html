<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>バブルボール＆ふわふわ タイマー</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#111111">

  <style>
    h1 { font-size:26px; margin-bottom:6px; }
    #deviceLabel { margin:4px 0; }
    #networkStatus{font-size:18px;font-weight:bold;padding:8px 12px;border-radius:10px;display:inline-block;margin:6px 0;}
    .online{background:#d9f7d9;color:#087a08;}
    .offline{background:#ffd6d6;color:#b00020;}
    #controls{display:flex;align-items:center;gap:12px;margin-bottom:6px;flex-wrap:wrap;font-size:16px;}
    #timerCount,#startNumber,#playMode{font-size:16px;padding:2px;width:90px;}
    #createBtn,#salesBtn,#hideSalesBtn,#deviceBtn,#flushBtn{font-size:22px;padding:10px 18px;border-radius:10px;cursor:pointer;font-weight:bold;margin:8px 4px;}
    #salesBtn{background:#111;color:white;}
    #hideSalesBtn{background:#666;color:white;display:none;}
    #flushBtn{background:#2196F3;color:white;}
    #timers{display:grid;grid-template-columns:repeat(7,1fr);gap:15px;width:100%;margin-top:6px;}
    .timer{text-align:center;}
    button.timerBtn{width:100%;height:70px;font-size:40px;font-weight:bold;border-radius:16px;cursor:pointer;padding:0;}
    .waiting{background:blue;color:white;}
    .running{background:green;color:white;}
    .finished{background:red;color:white;}
    .callBtn{margin-top:4px;width:100%;height:36px;font-size:18px;background:#ff9800;color:white;border:none;border-radius:10px;font-weight:bold;cursor:pointer;}
    .callBtnQueued{
    background:#FFD600 !important;
    color:#000 !important;
    border:3px solid #FF9800 !important;
}
    .callBtnPlaying{background:#2ecc71!important;color:white!important;}
    .refundBtn{background:#b00020;color:white;font-size:24px!important;}
    .yenBtn{background:#ff9800;color:white;font-size:24px!important;}
    .timeRow{display:flex;justify-content:center;align-items:center;gap:4px;margin:4px 0;}
    .timeRow label{font-size:18px;}
    .timeRow select{font-size:18px;padding:2px 4px;}
    .displayText{font-size:18px;margin-top:2px;font-weight:bold;}
    .displayUp{font-size:18px;font-weight:bold;margin-top:2px;}
    @keyframes blink{0%{color:red;}50%{color:transparent;}100%{color:red;}}
    .blink{animation:blink 1s step-start infinite;font-weight:bold;}
    #summary,#dailySummary{display:none;margin-top:14px;border-top:1px solid #ccc;padding-top:8px;font-size:16px;}
    #summary h2,#dailySummary h2{font-size:20px;margin:6px 0;}
    #dailySummary input[type=date]{font-size:16px;margin-bottom:4px;}
  </style>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }
  </script>
</head>
<body>
  <h1>バブルボール＆ふわふわ　タイマー</h1>
  <h2 id="deviceLabel"></h2>

  <div id="networkStatus">確認中</div>

  <div id="controls">
    <label>タイマー数:</label>
    <select id="timerCount">
      <option value="10">10</option><option value="15">15</option><option value="20">20</option>
      <option value="25">25</option><option value="30" selected>30</option><option value="35">35</option>
      <option value="40">40</option><option value="45">45</option><option value="50">50</option>
    </select>

    <label>開始番号:</label>
    <input type="number" id="startNumber" value="1" min="1" max="999">

    <label>モード:</label>
    <select id="playMode" onchange="savePlayMode()">
      <option value="fuwafuwa">ふわふわ</option>
      <option value="bubble">バブル</option>
    </select>

    <button id="createBtn" onclick="generateTimers()">個数確定</button>
    <button id="deviceBtn" onclick="changeDeviceName()">端末名変更</button>
  </div>

  <div id="timers"></div>

  <button id="flushBtn" onclick="flushOfflineQueue()">未送信を送信</button>
  <button id="salesBtn" onclick="showSales()">売上を見る</button>
  <button id="hideSalesBtn" onclick="hideSales()">売上を隠す</button>

  <div id="summary">
    <h2>今日の履歴と売上</h2>
    <p>10分：<span id="count10">0回</span>（売上：<span id="fee10">0円</span>）</p>
    <p>20分：<span id="count20">0回</span>（売上：<span id="fee20">0円</span>）</p>
    <p>30分：<span id="count30">0回</span>（売上：<span id="fee30">0円</span>）</p>
    <p>500円返金：<span id="refund500Count">0回</span>（返金：<span id="refund500Fee">0円</span>）</p>
    <h2>今日のキャンセル回数：<span id="cancelCount">0回</span></h2>
    <h2>今日の売上合計：<span id="feeTotal">0円</span></h2>
  </div>

  <div id="dailySummary">
    <h2>日付ごとの集計</h2>
    <label>集計日：</label><input type="date" id="summaryDate">
    <p>10分：<span id="sum10">0回</span>（売上：<span id="sumFee10">0円</span>）</p>
    <p>20分：<span id="sum20">0回</span>（売上：<span id="sumFee20">0円</span>）</p>
    <p>30分：<span id="sum30">0回</span>（売上：<span id="sumFee30">0円</span>）</p>
    <p>500円返金：<span id="sumRefund500">0回</span>（返金：<span id="sumRefund500Fee">0円</span>）</p>
    <p>キャンセル回数：<span id="sumCancel">0回</span></p>
    <h2>その日の売上合計：<span id="sumFeeTotal">0円</span></h2>
  </div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbyT3SeO06Z5fpoZWbBZPmLrbEO88n7Dlx6vDhwwqJ5ZBIO-x7xSFAWKVXp88y6e_8d_aA/exec";
const SALES_PIN = "4181";
let DEVICE_NAME = localStorage.getItem("deviceName") || prompt("端末名を入力してください") || "未設定";
localStorage.setItem("deviceName", DEVICE_NAME);

let intervals = {}, afterIntervals = {}, timeoutHandles = {}, activeCallToken = {};
let audioQueue = [], audioPlaying = false, currentAudio = null, currentTask = null, currentFinish = null;
let press10 = 0, press20 = 0, press30 = 0, cancelCount = 0, refund500Count = 0;
let dailyStats = {}, currentDateKey = "";

function getTodayKey(){const now=new Date();return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}`;}
function yen(n){return Number(n).toLocaleString("ja-JP")+"円";}
function getPrice(minutes){if(minutes===10)return 500;if(minutes===20)return 500;if(minutes===30)return 1000;return 0;}
function getItemKey(minutes){if(minutes===10)return "p10";if(minutes===20)return "p20";if(minutes===30)return "p30";return "";}
function getOfflineQueue(){try{return JSON.parse(localStorage.getItem("offlineSendQueue")||"[]");}catch(e){return [];}}
function saveOfflineQueue(queue){localStorage.setItem("offlineSendQueue",JSON.stringify(queue));updateNetworkStatus();}
function sendToSheet(data){data._queuedAt=Date.now();if(!navigator.onLine){const q=getOfflineQueue();q.push(data);saveOfflineQueue(q);return;}fetch(GAS_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(data)}).catch(()=>{const q=getOfflineQueue();q.push(data);saveOfflineQueue(q);});}
function flushOfflineQueue(){if(!navigator.onLine){updateNetworkStatus();alert("オフライン中です。オンラインになってから送信します。");return;}const q=getOfflineQueue();if(q.length===0){updateNetworkStatus();return;}fetch(GAS_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(q)}).then(()=>{localStorage.removeItem("offlineSendQueue");updateNetworkStatus();alert(q.length+"件の未送信データを送信しました");}).catch(()=>{updateNetworkStatus();alert("送信に失敗しました。データは保存されています。");});}
function updateNetworkStatus(){const el=document.getElementById("networkStatus");if(!el)return;const c=getOfflineQueue().length;if(navigator.onLine){el.className="online";el.textContent=c>0?`オンライン・未送信 ${c}件`:"オンライン・未送信なし";}else{el.className="offline";el.textContent=`オフライン・未送信 ${c}件`;}}
window.addEventListener("online",()=>{updateNetworkStatus();flushOfflineQueue();});window.addEventListener("offline",updateNetworkStatus);

function loadDailyStats(){try{dailyStats=JSON.parse(localStorage.getItem("bbTimerDailyStats")||"{}");}catch(e){dailyStats={};}}
function saveDailyStats(){localStorage.setItem("bbTimerDailyStats",JSON.stringify(dailyStats));}
function loadTodayCountersFromDailyStats(){const d=dailyStats[currentDateKey]||{};press10=d.press10||0;press20=d.press20||0;press30=d.press30||0;cancelCount=d.cancel||0;refund500Count=d.refund500||0;updateCountersDisplay();}
function syncTodayToDailyStats(){dailyStats[currentDateKey]={press10,press20,press30,cancel:cancelCount,refund500:refund500Count};saveDailyStats();}
function updateCountersDisplay(){document.getElementById("count10").textContent=press10+"回";document.getElementById("count20").textContent=press20+"回";document.getElementById("count30").textContent=press30+"回";document.getElementById("cancelCount").textContent=cancelCount+"回";document.getElementById("refund500Count").textContent=refund500Count+"回";const f10=press10*500,f20=press20*500,f30=press30*1000,rf=refund500Count*500,total=f10+f20+f30-rf;document.getElementById("fee10").textContent=yen(f10);document.getElementById("fee20").textContent=yen(f20);document.getElementById("fee30").textContent=yen(f30);document.getElementById("refund500Fee").textContent="-"+yen(rf);document.getElementById("feeTotal").textContent=yen(total);updateDailySummaryView(document.getElementById("summaryDate")?.value||currentDateKey);}
function updateDailySummaryView(dateKey){const d=dailyStats[dateKey]||{};const f10=(d.press10||0)*500,f20=(d.press20||0)*500,f30=(d.press30||0)*1000,rf=(d.refund500||0)*500,total=f10+f20+f30-rf;document.getElementById("sum10").textContent=(d.press10||0)+"回";document.getElementById("sum20").textContent=(d.press20||0)+"回";document.getElementById("sum30").textContent=(d.press30||0)+"回";document.getElementById("sumCancel").textContent=(d.cancel||0)+"回";document.getElementById("sumRefund500").textContent=(d.refund500||0)+"回";document.getElementById("sumFee10").textContent=yen(f10);document.getElementById("sumFee20").textContent=yen(f20);document.getElementById("sumFee30").textContent=yen(f30);document.getElementById("sumRefund500Fee").textContent="-"+yen(rf);document.getElementById("sumFeeTotal").textContent=yen(total);}

function showSales(){sendToSheet({type:"sales_view",ts:Date.now(),device:DEVICE_NAME,page:"ふわふわタイマー",message:"売上を見るボタンが押されました"});const pin=prompt("暗証番号を入力してください");if(pin!==SALES_PIN){alert("暗証番号が違います");return;}document.getElementById("summary").style.display="block";document.getElementById("dailySummary").style.display="block";document.getElementById("hideSalesBtn").style.display="inline-block";}
function hideSales(){document.getElementById("summary").style.display="none";document.getElementById("dailySummary").style.display="none";document.getElementById("hideSalesBtn").style.display="none";}
function refund500(){if(!confirm("500円返金しますか？"))return;refund500Count++;syncTodayToDailyStats();updateCountersDisplay();sendToSheet({type:"sale",ts:Date.now(),device:DEVICE_NAME,key:"refund500",name:"500円返金",unitPrice:-500,qty:1,subtotal:-500});}
function notifyYen10000(){const btn=document.getElementById("yen10000Btn");if(btn){btn.innerHTML="送信中";btn.disabled=true;}sendToSheet({type:"yen10000",ts:Date.now(),device:DEVICE_NAME,page:"ふわふわタイマー",message:"一万円札が使用されました"});setTimeout(()=>{if(btn){btn.innerHTML="一万円札";btn.disabled=false;}},1200);}

function isStillFinished(num,token){const btn=document.getElementById("btn"+num);return btn&&btn.getAttribute("data-status")==="finished"&&activeCallToken[num]===token;}
function playAudioFile(file){return new Promise(resolve=>{const audio=new Audio(file);currentAudio=audio;let done=false;currentFinish=()=>{if(done)return;done=true;currentAudio=null;currentFinish=null;resolve();};audio.onended=currentFinish;audio.onerror=currentFinish;audio.play().catch(currentFinish);});}
function stopCurrentAudioIfNum(num){if(currentTask&&currentTask.num===num&&currentAudio){try{currentAudio.pause();currentAudio.currentTime=0;}catch(e){} if(currentFinish)currentFinish();}}
function updateCallButtons(){document.querySelectorAll(".callBtn").forEach(btn=>{btn.classList.remove("callBtnQueued","callBtnPlaying");btn.innerHTML="🔊 呼び出し";btn.disabled=false;});if(currentTask&&currentTask.callBtn){currentTask.callBtn.classList.add("callBtnPlaying");currentTask.callBtn.innerHTML="▶ 再生中";currentTask.callBtn.disabled=true;}audioQueue.forEach((task,idx)=>{if(task.callBtn){task.callBtn.classList.add("callBtnQueued");task.callBtn.innerHTML=`待機中 ${idx+1}`;task.callBtn.disabled=false;}});}
function enqueueAudioTask(task){audioQueue.push(task);updateCallButtons();runAudioQueue();}
async function runAudioQueue(){if(audioPlaying)return;const task=audioQueue.shift();if(!task){updateCallButtons();return;}if(task.requireFinished&&!isStillFinished(task.num,task.token)){runAudioQueue();return;}audioPlaying=true;currentTask=task;updateCallButtons();for(const file of task.files){if(task.requireFinished&&!isStillFinished(task.num,task.token))break;await playAudioFile(file);}currentTask=null;audioPlaying=false;updateCallButtons();runAudioQueue();}
function playEndAudio(num,token){const mode=document.getElementById("playMode").value;const messageFile=mode==="bubble"?"bubble.wav":"fuwafuwa.wav";enqueueAudioTask({num,token,requireFinished:true,files:[`${num}.wav`,messageFile]});}
function callNumber(num,btn){enqueueAudioTask({num,token:"manual_"+Date.now(),requireFinished:false,callBtn:btn,files:[`${num}.wav`]});}

function generateTimers(){const container=document.getElementById("timers");Object.keys(intervals).forEach(k=>clearInterval(intervals[k]));Object.keys(afterIntervals).forEach(k=>clearInterval(afterIntervals[k]));Object.keys(timeoutHandles).forEach(k=>timeoutHandles[k].forEach(id=>clearTimeout(id)));intervals={};afterIntervals={};timeoutHandles={};activeCallToken={};audioQueue=[];updateCallButtons();container.innerHTML="";const count=parseInt(document.getElementById("timerCount").value,10)||0;const start=parseInt(document.getElementById("startNumber").value,10)||1;for(let i=0;i<count;i++){const num=start+i;const div=document.createElement("div");div.className="timer";div.innerHTML=`<button id="btn${num}" class="timerBtn waiting" data-status="waiting" onclick="handleButton(${num})">${num}</button><button id="callBtn${num}" class="callBtn" onclick="callNumber(${num}, this)">🔊 呼び出し</button><div class="timeRow"><label>時間:</label><select id="time${num}"><option value="600" selected>10分</option><option value="1200">20分</option><option value="1800">30分</option></select></div><p id="display${num}" class="displayText">未開始</p>`;container.appendChild(div);}const refundDiv=document.createElement("div");refundDiv.className="timer";refundDiv.innerHTML=`<button id="refundBtn" class="timerBtn refundBtn" onclick="refund500()">500円<br>返金</button><p class="displayText">返金</p>`;container.appendChild(refundDiv);const yenDiv=document.createElement("div");yenDiv.className="timer";yenDiv.innerHTML=`<button id="yen10000Btn" class="timerBtn yenBtn" onclick="notifyYen10000()">一万円札</button><p class="displayText">メール通知</p>`;container.appendChild(yenDiv);}
function handleButton(num){const button=document.getElementById("btn"+num);if(!button)return;const status=button.getAttribute("data-status");if(status==="waiting")startTimer(num);else if(status==="running")cancelTimer(num);else if(status==="finished")resetTimer(num);}
function startTimer(num){const timeSelect=document.getElementById("time"+num);const setTimeSec=parseInt(timeSelect.value,10)||0;const minutes=setTimeSec/60;const price=getPrice(minutes);if(minutes===10)press10++;if(minutes===20)press20++;if(minutes===30)press30++;syncTodayToDailyStats();updateCountersDisplay();sendToSheet({type:"sale",ts:Date.now(),device:DEVICE_NAME,key:getItemKey(minutes),name:minutes+"分",unitPrice:price,qty:1,subtotal:price});const display=document.getElementById("display"+num);const button=document.getElementById("btn"+num);let time=setTimeSec;button.className="timerBtn running";button.setAttribute("data-status","running");display.textContent=formatTime(time);display.style.color="black";display.classList.remove("displayUp");intervals[num]=setInterval(()=>{time--;display.textContent=formatTime(time);if(time<=30&&time>0)display.classList.add("blink");else display.classList.remove("blink");if(time<=0){clearInterval(intervals[num]);intervals[num]=null;display.textContent="時間です！";display.classList.remove("blink");display.style.color="red";button.className="timerBtn finished";button.setAttribute("data-status","finished");const token=Date.now()+"_"+num;activeCallToken[num]=token;playEndAudio(num,token);timeoutHandles[num]=[setTimeout(()=>{if(isStillFinished(num,token)){enqueueAudioTask({num,token,requireFinished:true,files:[`${num}.wav`]});}},180000)];let afterSec=0;afterIntervals[num]=setInterval(()=>{afterSec++;display.innerHTML=`終了後:<br>${formatTime(afterSec)}`;display.classList.add("displayUp");},1000);}},1000);}
function cancelTimer(num){if(intervals[num])clearInterval(intervals[num]);if(afterIntervals[num])clearInterval(afterIntervals[num]);if(timeoutHandles[num])timeoutHandles[num].forEach(id=>clearTimeout(id));intervals[num]=null;afterIntervals[num]=null;timeoutHandles[num]=[];activeCallToken[num]=null;audioQueue=audioQueue.filter(item=>item.num!==num);stopCurrentAudioIfNum(num);updateCallButtons();const button=document.getElementById("btn"+num);const display=document.getElementById("display"+num);if(!button||!display)return;button.className="timerBtn waiting";button.setAttribute("data-status","waiting");display.textContent="未開始";display.style.color="black";display.classList.remove("blink","displayUp");cancelCount++;syncTodayToDailyStats();updateCountersDisplay();const sel=document.getElementById("time"+num);if(sel)sel.value="600";}
function resetTimer(num){if(afterIntervals[num])clearInterval(afterIntervals[num]);if(timeoutHandles[num])timeoutHandles[num].forEach(id=>clearTimeout(id));afterIntervals[num]=null;timeoutHandles[num]=[];activeCallToken[num]=null;audioQueue=audioQueue.filter(item=>item.num!==num);stopCurrentAudioIfNum(num);updateCallButtons();const button=document.getElementById("btn"+num);const display=document.getElementById("display"+num);if(!button||!display)return;button.className="timerBtn waiting";button.setAttribute("data-status","waiting");display.textContent="未開始";display.style.color="black";display.classList.remove("blink","displayUp");const sel=document.getElementById("time"+num);if(sel)sel.value="600";}
function formatTime(seconds){seconds=Number(seconds)||0;if(seconds<0)seconds=0;const m=Math.floor(seconds/60);const s=seconds%60;return `${m}分${s}秒`;}
function changeDeviceName(){const name=prompt("端末名を入力してください",DEVICE_NAME);if(!name)return;DEVICE_NAME=name;localStorage.setItem("deviceName",DEVICE_NAME);document.getElementById("deviceLabel").textContent="端末名："+DEVICE_NAME;alert("端末名を変更しました\n\n"+DEVICE_NAME);}
function savePlayMode(){localStorage.setItem("playMode",document.getElementById("playMode").value);}
window.addEventListener("load",()=>{currentDateKey=getTodayKey();loadDailyStats();loadTodayCountersFromDailyStats();document.getElementById("playMode").value=localStorage.getItem("playMode")||"fuwafuwa";document.getElementById("deviceLabel").textContent="端末名："+DEVICE_NAME;generateTimers();const summaryDateInput=document.getElementById("summaryDate");summaryDateInput.value=currentDateKey;updateDailySummaryView(currentDateKey);summaryDateInput.addEventListener("change",()=>{updateDailySummaryView(summaryDateInput.value||currentDateKey);});updateNetworkStatus();flushOfflineQueue();});
window.generateTimers=generateTimers;window.handleButton=handleButton;window.showSales=showSales;window.hideSales=hideSales;window.refund500=refund500;window.notifyYen10000=notifyYen10000;window.changeDeviceName=changeDeviceName;window.savePlayMode=savePlayMode;window.callNumber=callNumber;window.flushOfflineQueue=flushOfflineQueue;
</script>
</body>
</html>
