<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>バブルボール＆ふわふわ タイマー</title>

  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#111111">

  <style>
    h1 { font-size: 26px; margin-bottom: 6px; }

    #controls {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 6px;
      flex-wrap: wrap;
      font-size: 16px;
    }

    #timerCount, #startNumber {
      font-size: 16px;
      padding: 2px;
      width: 70px;
    }

    #createBtn, #salesBtn, #hideSalesBtn {
      font-size: 22px;
      padding: 10px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      margin: 8px 4px;
    }

    #salesBtn { background: #111; color: white; }
    #hideSalesBtn { background: #666; color: white; display:none; }

    #timers {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 15px;
      width: 100%;
      margin-top: 6px;
    }

    .timer { text-align: center; }

    button.timerBtn {
      width: 100%;
      height: 70px;
      font-size: 40px;
      font-weight: bold;
      border-radius: 16px;
      cursor: pointer;
      padding: 0;
    }

    .waiting  { background-color: blue; color: white; }
    .running  { background-color: green; color: white; }
    .finished { background-color: red; color: white; }

    .refundBtn {
      background:#b00020;
      color:white;
      font-size:24px !important;
    }

    .yenBtn {
      background:#ff9800;
      color:white;
      font-size:24px !important;
    }

    .timeRow {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 4px;
      margin: 4px 0;
    }

    .timeRow label { font-size: 18px; }
    .timeRow select { font-size: 18px; padding: 2px 4px; }

    .displayText {
      font-size: 18px;
      margin-top: 2px;
      font-weight: bold;
    }

    .displayUp {
      font-size: 18px;
      font-weight: bold;
      margin-top: 2px;
    }

    @keyframes blink {
      0% { color: red; }
      50% { color: transparent; }
      100% { color: red; }
    }

    .blink {
      animation: blink 1s step-start infinite;
      font-weight: bold;
    }

    #summary, #dailySummary {
      display: none;
      margin-top: 14px;
      border-top: 1px solid #ccc;
      padding-top: 8px;
      font-size: 16px;
    }

    #summary h2, #dailySummary h2 {
      font-size: 20px;
      margin: 6px 0;
    }

    #dailySummary input[type=date] {
      font-size: 16px;
      margin-bottom: 4px;
    }
  </style>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js");
  });
}
</script>
</head>

<body>
  <h1>バブルボール＆ふわふわ　タイマー</h1>
  <h2 id="deviceLabel"></h2>

  <div id="controls">
    <label>タイマー数:</label>
    <select id="timerCount">
      <option value="10">10</option>
      <option value="15">15</option>
      <option value="20">20</option>
      <option value="25">25</option>
      <option value="30" selected>30</option>
      <option value="35">35</option>
      <option value="40">40</option>
      <option value="45">45</option>
      <option value="50">50</option>
    </select>

    <label>開始番号:</label>
    <input type="number" id="startNumber" value="1" min="1" max="999">

    <button id="createBtn" onclick="generateTimers()">個数確定</button>
    <button onclick="changeDeviceName()">端末名変更</button>
  </div>

  <div id="timers"></div>

  <button id="salesBtn" onclick="showSales()">売上を見る</button>
  <button id="hideSalesBtn" onclick="hideSales()">売上を隠す</button>

  <div id="summary">
    <h2>今日の履歴と売上</h2>
    <p>10分：<span id="count10">0回</span>（売上：<span id="fee10">0円</span>）</p>
    <p>20分：<span id="count20">0回</span>（売上：<span id="fee20">0円</span>）</p>
    <p>30分：<span id="count30">0回</span>（売上：<span id="fee30">0円</span>）</p>
    <p>500円返金：<span id="refund500Count">0回</span>（返金：<span id="refund500Fee">0円</span>）</p>
    <h2>今日のキャンセル回数：<span id="cancelCount">0回</span></h2>
    <h2>今日の売上合計：<span id="feeTotal">0円</span></h2>
  </div>

  <div id="dailySummary">
    <h2>日付ごとの集計</h2>
    <label>集計日：</label>
    <input type="date" id="summaryDate">

    <p>10分：<span id="sum10">0回</span>（売上：<span id="sumFee10">0円</span>）</p>
    <p>20分：<span id="sum20">0回</span>（売上：<span id="sumFee20">0円</span>）</p>
    <p>30分：<span id="sum30">0回</span>（売上：<span id="sumFee30">0円</span>）</p>
    <p>500円返金：<span id="sumRefund500">0回</span>（返金：<span id="sumRefund500Fee">0円</span>）</p>
    <p>キャンセル回数：<span id="sumCancel">0回</span></p>
    <h2>その日の売上合計：<span id="sumFeeTotal">0円</span></h2>
  </div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbyT3SeO06Z5fpoZWbBZPmLrbEO88n7Dlx6vDhwwqJ5ZBIO-x7xSFAWKVXp88y6e_8d_aA/exec";

  let DEVICE_NAME =
    localStorage.getItem("deviceName") ||
    prompt("端末名を入力してください");

  if (DEVICE_NAME) {
    localStorage.setItem("deviceName", DEVICE_NAME);
  }

  const SALES_PIN = "4181";

  let container;

  let intervals = {};
  let afterIntervals = {};
  let timeoutHandles = {};

  let audioQueue = [];
  let isPlaying = false;

  let press10 = 0;
  let press20 = 0;
  let press30 = 0;
  let cancelCount = 0;
  let refund500Count = 0;

  let dailyStats = {};
  let currentDateKey = "";

  function getTodayKey() {
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth() + 1).padStart(2, "0");
    const d = String(now.getDate()).padStart(2, "0");
    return `${y}-${m}-${d}`;
  }

  function yen(n) {
    return Number(n).toLocaleString("ja-JP") + "円";
  }

  function getPrice(minutes) {
    if (minutes === 10) return 500;
    if (minutes === 20) return 500;
    if (minutes === 30) return 1000;
    return 0;
  }

  function getItemKey(minutes) {
    if (minutes === 10) return "p10";
    if (minutes === 20) return "p20";
    if (minutes === 30) return "p30";
    return "";
  }

  function sendToSheet(data) {
    fetch(GAS_URL, {
      method: "POST",
      mode: "no-cors",
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },
      body: JSON.stringify(data)
    }).catch(err => {
      console.log("送信失敗", err);
    });
  }

  function loadDailyStats() {
    const saved = localStorage.getItem("bbTimerDailyStats");
    if (!saved) {
      dailyStats = {};
      return;
    }

    try {
      dailyStats = JSON.parse(saved) || {};
    } catch (e) {
      dailyStats = {};
    }
  }

  function saveDailyStats() {
    localStorage.setItem("bbTimerDailyStats", JSON.stringify(dailyStats));
  }

  function loadTodayCountersFromDailyStats() {
    const data = dailyStats[currentDateKey];

    if (data) {
      press10 = data.press10 || 0;
      press20 = data.press20 || 0;
      press30 = data.press30 || 0;
      cancelCount = data.cancel || 0;
      refund500Count = data.refund500 || 0;
    } else {
      press10 = 0;
      press20 = 0;
      press30 = 0;
      cancelCount = 0;
      refund500Count = 0;
    }

    updateCountersDisplay();
  }

  function syncTodayToDailyStats() {
    if (!dailyStats[currentDateKey]) {
      dailyStats[currentDateKey] = {
        press10: 0,
        press20: 0,
        press30: 0,
        cancel: 0,
        refund500: 0
      };
    }

    dailyStats[currentDateKey].press10 = press10;
    dailyStats[currentDateKey].press20 = press20;
    dailyStats[currentDateKey].press30 = press30;
    dailyStats[currentDateKey].cancel = cancelCount;
    dailyStats[currentDateKey].refund500 = refund500Count;

    saveDailyStats();
  }

  function updateCountersDisplay() {
    document.getElementById("count10").textContent = press10 + "回";
    document.getElementById("count20").textContent = press20 + "回";
    document.getElementById("count30").textContent = press30 + "回";
    document.getElementById("cancelCount").textContent = cancelCount + "回";
    document.getElementById("refund500Count").textContent = refund500Count + "回";

    const fee10 = press10 * 500;
    const fee20 = press20 * 500;
    const fee30 = press30 * 1000;
    const refund500 = refund500Count * 500;
    const total = fee10 + fee20 + fee30 - refund500;

    document.getElementById("fee10").textContent = yen(fee10);
    document.getElementById("fee20").textContent = yen(fee20);
    document.getElementById("fee30").textContent = yen(fee30);
    document.getElementById("refund500Fee").textContent = "-" + yen(refund500);
    document.getElementById("feeTotal").textContent = yen(total);

    const dateKey = document.getElementById("summaryDate")?.value || currentDateKey;
    updateDailySummaryView(dateKey);
  }

  function updateDailySummaryView(dateKey) {
    const data = dailyStats[dateKey] || {
      press10: 0,
      press20: 0,
      press30: 0,
      cancel: 0,
      refund500: 0
    };

    const fee10 = (data.press10 || 0) * 500;
    const fee20 = (data.press20 || 0) * 500;
    const fee30 = (data.press30 || 0) * 1000;
    const refund500 = (data.refund500 || 0) * 500;
    const total = fee10 + fee20 + fee30 - refund500;

    document.getElementById("sum10").textContent = (data.press10 || 0) + "回";
    document.getElementById("sum20").textContent = (data.press20 || 0) + "回";
    document.getElementById("sum30").textContent = (data.press30 || 0) + "回";
    document.getElementById("sumCancel").textContent = (data.cancel || 0) + "回";
    document.getElementById("sumRefund500").textContent = (data.refund500 || 0) + "回";

    document.getElementById("sumFee10").textContent = yen(fee10);
    document.getElementById("sumFee20").textContent = yen(fee20);
    document.getElementById("sumFee30").textContent = yen(fee30);
    document.getElementById("sumRefund500Fee").textContent = "-" + yen(refund500);
    document.getElementById("sumFeeTotal").textContent = yen(total);
  }

  function showSales() {
    const pin = prompt("暗証番号を入力してください");

    if (pin !== SALES_PIN) {
      alert("暗証番号が違います");
      return;
    }

    document.getElementById("summary").style.display = "block";
    document.getElementById("dailySummary").style.display = "block";
    document.getElementById("hideSalesBtn").style.display = "inline-block";
  }

  function hideSales() {
    document.getElementById("summary").style.display = "none";
    document.getElementById("dailySummary").style.display = "none";
    document.getElementById("hideSalesBtn").style.display = "none";
  }

  function refund500() {
    if (!confirm("500円返金しますか？")) return;

    refund500Count++;

    syncTodayToDailyStats();
    updateCountersDisplay();

    sendToSheet({
      type: "sale",
      ts: Date.now(),
      device: DEVICE_NAME,
      key: "refund500",
      name: "500円返金",
      unitPrice: -500,
      qty: 1,
      subtotal: -500
    });
  }

  function notifyYen10000() {
    if (!confirm("一万円札の通知を送信しますか？")) return;

    sendToSheet({
      type: "yen10000",
      ts: Date.now(),
      device: DEVICE_NAME,
      page: "ふわふわタイマー",
      message: "一万円札が使用されました"
    });

    alert("通知を送信しました");
  }

  function playAudioQueue() {
    if (isPlaying) return;

    if (audioQueue.length === 0) {
      isPlaying = false;
      return;
    }

    isPlaying = true;

    const item = audioQueue.shift();
    const audio = new Audio(item.file);

    audio.onended = () => {
      setTimeout(() => {
        isPlaying = false;
        playAudioQueue();
      }, 1000);
    };

    audio.onerror = () => {
      setTimeout(() => {
        isPlaying = false;
        playAudioQueue();
      }, 1000);
    };

    audio.play().catch(() => {
      setTimeout(() => {
        isPlaying = false;
        playAudioQueue();
      }, 1000);
    });
  }

  function enqueueAudio(num, file) {
    audioQueue.push({
      num: num,
      file: file
    });

    playAudioQueue();
  }

  function generateTimers() {
    container = document.getElementById("timers");

    Object.keys(intervals).forEach(k => clearInterval(intervals[k]));
    Object.keys(afterIntervals).forEach(k => clearInterval(afterIntervals[k]));
    Object.keys(timeoutHandles).forEach(k => {
      timeoutHandles[k].forEach(id => clearTimeout(id));
    });

    intervals = {};
    afterIntervals = {};
    timeoutHandles = {};

    audioQueue = [];
    isPlaying = false;

    container.innerHTML = "";

    const count = parseInt(document.getElementById("timerCount").value, 10) || 0;
    const start = parseInt(document.getElementById("startNumber").value, 10) || 1;

    for (let i = 0; i < count; i++) {
      const num = start + i;

      const div = document.createElement("div");
      div.className = "timer";

      div.innerHTML = `
        <button id="btn${num}" class="timerBtn waiting" data-status="waiting" onclick="handleButton(${num})">${num}</button>
        <div class="timeRow">
          <label>時間:</label>
          <select id="time${num}">
            <option value="600" selected>10分</option>
            <option value="1200">20分</option>
            <option value="1800">30分</option>
          </select>
        </div>
        <p id="display${num}" class="displayText">未開始</p>
      `;

      container.appendChild(div);
    }

    const refundDiv = document.createElement("div");
    refundDiv.className = "timer";
    refundDiv.innerHTML = `
      <button id="refundBtn" class="timerBtn refundBtn" onclick="refund500()">
        500円<br>返金
      </button>
      <p class="displayText">返金</p>
    `;
    container.appendChild(refundDiv);

    const yenDiv = document.createElement("div");
    yenDiv.className = "timer";
    yenDiv.innerHTML = `
      <button id="yen10000Btn" class="timerBtn yenBtn" onclick="notifyYen10000()">
        一万円札
      </button>
      <p class="displayText">メール通知</p>
    `;
    container.appendChild(yenDiv);
  }

  function handleButton(num) {
    const button = document.getElementById("btn" + num);
    if (!button) return;

    const status = button.getAttribute("data-status");

    if (status === "waiting") {
      startTimer(num);
    } else if (status === "running") {
      cancelTimer(num);
    } else if (status === "finished") {
      resetTimer(num);
    }
  }

  function startTimer(num) {
    const timeSelect = document.getElementById("time" + num);
    const setTimeSec = parseInt(timeSelect.value, 10) || 0;
    const minutes = setTimeSec / 60;
    const price = getPrice(minutes);

    if (minutes === 10) press10++;
    if (minutes === 20) press20++;
    if (minutes === 30) press30++;

    syncTodayToDailyStats();
    updateCountersDisplay();

    sendToSheet({
      type: "sale",
      ts: Date.now(),
      device: DEVICE_NAME,
      key: getItemKey(minutes),
      name: minutes + "分",
      unitPrice: price,
      qty: 1,
      subtotal: price
    });

    const display = document.getElementById("display" + num);
    const button = document.getElementById("btn" + num);

    let time = setTimeSec;

    button.className = "timerBtn running";
    button.setAttribute("data-status", "running");
    display.textContent = formatTime(time);
    display.style.color = "black";
    display.classList.remove("displayUp");

    intervals[num] = setInterval(() => {
      time--;
      display.textContent = formatTime(time);

      if (time <= 30 && time > 0) {
        display.classList.add("blink");
      } else {
        display.classList.remove("blink");
      }

      if (time <= 0) {
        clearInterval(intervals[num]);
        intervals[num] = null;

        display.textContent = "時間です！";
        display.classList.remove("blink");
        display.style.color = "red";

        button.className = "timerBtn finished";
        button.setAttribute("data-status", "finished");

        enqueueAudio(num, `${num}.wav`);

        timeoutHandles[num] = [
          setTimeout(() => {
            const btn = document.getElementById("btn" + num);
            if (btn && btn.getAttribute("data-status") === "finished") {
              enqueueAudio(num, `${num}.wav`);
            }
          }, 180000)
        ];

        let afterSec = 0;

        afterIntervals[num] = setInterval(() => {
          afterSec++;
          display.innerHTML = `終了後:<br>${formatTime(afterSec)}`;
          display.classList.add("displayUp");
        }, 1000);
      }
    }, 1000);
  }

  function cancelTimer(num) {
    if (intervals[num]) {
      clearInterval(intervals[num]);
      intervals[num] = null;
    }

    if (afterIntervals[num]) {
      clearInterval(afterIntervals[num]);
      afterIntervals[num] = null;
    }

    if (timeoutHandles[num]) {
      timeoutHandles[num].forEach(id => clearTimeout(id));
      timeoutHandles[num] = [];
    }

    const button = document.getElementById("btn" + num);
    const display = document.getElementById("display" + num);

    if (!button || !display) return;

    button.className = "timerBtn waiting";
    button.setAttribute("data-status", "waiting");

    display.textContent = "未開始";
    display.style.color = "black";
    display.classList.remove("blink");
    display.classList.remove("displayUp");

    cancelCount++;

    syncTodayToDailyStats();
    updateCountersDisplay();

    const sel = document.getElementById("time" + num);
    if (sel) sel.value = "600";
  }

  function resetTimer(num) {
    if (afterIntervals[num]) {
      clearInterval(afterIntervals[num]);
      afterIntervals[num] = null;
    }

    if (timeoutHandles[num]) {
      timeoutHandles[num].forEach(id => clearTimeout(id));
      timeoutHandles[num] = [];
    }

    const button = document.getElementById("btn" + num);
    const display = document.getElementById("display" + num);

    if (!button || !display) return;

    button.className = "timerBtn waiting";
    button.setAttribute("data-status", "waiting");

    display.textContent = "未開始";
    display.style.color = "black";
    display.classList.remove("blink");
    display.classList.remove("displayUp");

    const sel = document.getElementById("time" + num);
    if (sel) sel.value = "600";
  }

  function formatTime(seconds) {
    seconds = Number(seconds) || 0;
    if (seconds < 0) seconds = 0;

    const m = Math.floor(seconds / 60);
    const s = seconds % 60;

    return `${m}分${s}秒`;
  }

  function changeDeviceName() {
    const name = prompt("端末名を入力してください", DEVICE_NAME);

    if (!name) return;

    DEVICE_NAME = name;

    localStorage.setItem("deviceName", DEVICE_NAME);

    document.getElementById("deviceLabel").textContent =
      "端末名：" + DEVICE_NAME;

    alert("端末名を変更しました\n\n" + DEVICE_NAME);
  }

  window.addEventListener("load", () => {
    container = document.getElementById("timers");

    currentDateKey = getTodayKey();

    loadDailyStats();
    loadTodayCountersFromDailyStats();

    generateTimers();

    document.getElementById("deviceLabel").textContent =
      "端末名：" + DEVICE_NAME;

    const summaryDateInput = document.getElementById("summaryDate");
    summaryDateInput.value = currentDateKey;
    updateDailySummaryView(currentDateKey);

    summaryDateInput.addEventListener("change", () => {
      updateDailySummaryView(summaryDateInput.value || currentDateKey);
    });
  });

  window.generateTimers = generateTimers;
  window.handleButton = handleButton;
  window.showSales = showSales;
  window.hideSales = hideSales;
  window.refund500 = refund500;
  window.notifyYen10000 = notifyYen10000;
  window.changeDeviceName = changeDeviceName;
</script>
</body>
</html>
